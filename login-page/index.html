<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Goldman (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <a class="home-btn" href="#" aria-label="Início">
      <!-- Home icon (solid) no estilo do protótipo -->
      <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3.2 2.7 11a1 1 0 0 0 .65 1.76H5v7.2c0 .55.45 1 1 1h4.2v-5.4c0-.55.45-1 1-1h1.6c.55 0 1 .45 1 1v5.4H18c.55 0 1-.45 1-1v-7.2h1.65A1 1 0 0 0 21.3 11L12 3.2z"/>
      </svg>
    </a>

    <nav class="nav-links">
      <a href="#">Início</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
      <button class="btn-login" type="button">Login</button>
    </nav>
  </header>

  <main class="container">
    <section class="left-side" aria-label="Ilustração"></section>

    <section class="right-side">
      <div class="form-container">
        <h1>BEM-VINDO<br>DE VOLTA!</h1>

        <form id="loginForm">
          <label for="email">E-mail:</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">👤</span>
            <input type="email" id="email" placeholder="Insira seu e-mail" required />
          </div>

          <label for="senha">Senha:</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">🔒</span>
            <input type="password" id="senha" placeholder="Insira sua senha" required />
          </div>

          <a href="#" class="forgot">Esqueci minha senha</a>
          <button type="submit" class="btn-submit">ENTRAR</button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
